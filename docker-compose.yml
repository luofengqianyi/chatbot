 # =============================================
# AI Chatbot - Docker Compose (production)
# =============================================
# 用法：
#   1. 把域名设成你的真实域名（下面 DOMAIN 变量）
#   2. 首次运行：docker compose up -d nginx-init
#      这会启动 certbot 申请证书
#   3. 然后：docker compose up -d
#      启动完整的后端 + nginx
# =============================================

services:
  # ---- FastAPI 后端 ----
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chatbot-backend
    restart: unless-stopped
    environment:
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=sqlite:///./data/chatbot.db
    volumes:
      - chatbot_data:/app/data
      - chatbot_uploads:/app/uploads
    expose:
      - "8888"
    networks:
      - chatbot-net

  # ---- Nginx 反向代理（HTTPS） ----
  nginx:
    image: nginx:alpine
    container_name: chatbot-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    networks:
      - chatbot-net

  # ---- SSL 证书自动申请（只需首次运行一次） ----
  certbot:
    image: certbot/certbot
    container_name: chatbot-certbot
    profiles:
      - manual
    entrypoint: |
      sh -c "certbot certonly --webroot -w /var/www/certbot \
        --email your-email@example.com \
        -d ${DOMAIN} \
        --agree-tos \
        --non-interactive"
    volumes:
      - ./deploy/ssl:/etc/letsencrypt
      - ./deploy/certbot-www:/var/www/certbot
    networks:
      - chatbot-net

  # ---- 证书自动续期（每月一次） ----
  certbot-renew:
    image: certbot/certbot
    container_name: chatbot-certbot-renew
    restart: unless-stopped
    entrypoint: |
      sh -c "while true; do \
        certbot renew --webroot -w /var/www/certbot --quiet; \
        sleep 2592000; done"
    volumes:
      - ./deploy/ssl:/etc/letsencrypt
      - ./deploy/certbot-www:/var/www/certbot
    networks:
      - chatbot-net

volumes:
  chatbot_data:
  chatbot_uploads:

networks:
  chatbot-net:
    driver: bridge
